name: deploy-vercel

# Every push to main triggers a production deployment via the Vercel CLI.
# Vercel projects already auto-deploy on push if you connect the GitHub
# app, but this gives us a manual fallback and full control.
#
# DISABLED BY DEFAULT: the recommended way to deploy is to connect the
# GitHub repo to your Vercel project in the Vercel dashboard
# (vercel.com → your project → Settings → Git → Connect). That gives
# auto-deploys on push without any secrets, no CLI, no workflow.
#
# If you want to use THIS workflow instead (e.g. to deploy to multiple
# Vercel projects from one repo), set the VERCEL_TOKEN secret and remove
# the `if: false` line below.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt into Node 24 on the GitHub Actions runner.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-vercel
  cancel-in-progress: false

jobs:
  deploy:
    # Set to `if: false` to disable this workflow. Re-enable by changing to
    # `if: true` once you've added the VERCEL_TOKEN repo secret.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel config (creates .vercel/)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (if any build step is added later)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
