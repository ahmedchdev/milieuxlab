name: alerts-cron

# Fires every 5 minutes. Vercel Hobby tier caps its own cron at 2/day,
# so we run it from GitHub Actions instead — free, no daily cap, and
# the Vercel endpoint is just a regular HTTP call.
on:
  schedule:
    - cron: "*/5 * * * *"

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:
    inputs:
      url:
        description: "App URL to ping"
        required: false
        default: "https://milieuxlab-m4tiziddd-ahmedchdevs-projects.vercel.app"

# Opt into Node 24 on the GitHub Actions runner (default becomes Node 24
# on 2026-06-16; Node 20 is removed 2026-09-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  # Don't pile up overlapping runs if one is slow
  group: alerts-cron
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Ping the cron endpoint
        env:
          APP_URL: ${{ github.event.inputs.url || 'https://milieuxlab-m4tiziddd-ahmedchdevs-projects.vercel.app' }}
        run: |
          echo "Pinging $APP_URL/api/cron-check-alerts"
          HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            --max-time 120 \
            "$APP_URL/api/cron-check-alerts")
          echo "HTTP $HTTP_CODE"
          echo "Response body:"
          cat /tmp/resp.json || true
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Cron endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
